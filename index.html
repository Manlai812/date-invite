<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Date Invite 💌</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ffd6e7, #ffeccf);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      color: #d63384;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 20px;
      color: #555;
    }

    label {
      margin-top: 10px;
      display: block;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #ff4d88;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #e6005c;
    }

    .hidden {
      display: none;
    }

    .success {
      display: none;
      text-align: center;
      margin-top: 15px;
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>💌 A Small Question For You</h1>
  <p class="subtitle">I made this little page just for you 💖</p>

  <form id="dateForm"
        action="https://formspree.io/f/xkoqdkvn"
        method="POST">

    <!-- NAME -->
    <label>Your name</label>
    <input type="text" name="name" required>

    <!-- EMAIL (IMPORTANT FIX) -->
    <label>Your email</label>
    <input type="email" name="email" required>

    <!-- YES / NO -->
    <label>Do you want to go on a date with me?</label>
    <input type="radio" name="answer" value="Yes" required> Yes
    <input type="radio" name="answer" value="No"> No

    <!-- TIME -->
    <label>When are you available?</label>
    <input type="text" name="time" required>

    <!-- PLACE -->
    <label>Which place sounds nicest?</label>
    <select id="place" name="place">
      <option>Park 🌳</option>
      <option>Arcade 🎮</option>
      <option>Billiard 🎱</option>
      <option>Tennis 🎾 (Teach me)</option>
      <option value="other">Other</option>
    </select>

    <input type="text" id="otherPlace" name="other_place"
           placeholder="Your idea..." class="hidden">

    <!-- FOOD -->
    <label>What would you like?</label>
    <select id="food" name="food">
      <option>Coffee ☕</option>
      <option>Pizza 🍕</option>
      <option>Burger 🍔</option>
      <option>Ice cream 🍨</option>
      <option>Cake 🍰</option>
      <option value="other">Other</option>
    </select>

    <input type="text" id="otherFood" name="other_food"
           placeholder="Your choice..." class="hidden">

    <!-- MESSAGE -->
    <label>Any message for me?</label>
    <textarea name="message"></textarea>

    <button type="submit">Submit 💖</button>

    <div class="success" id="successMsg">
      💖 Thank you! I got your answer!
    </div>

  </form>
</div>

<script>
const form = document.getElementById("dateForm");
const successMsg = document.getElementById("successMsg");

document.getElementById("place").addEventListener("change", function() {
  document.getElementById("otherPlace").classList.toggle("hidden", this.value !== "other");
});

document.getElementById("food").addEventListener("change", function() {
  document.getElementById("otherFood").classList.toggle("hidden", this.value !== "other");
});

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const data = new FormData(form);

  const response = await fetch(form.action, {
    method: "POST",
    body: data,
    headers: {
      "Accept": "application/json"
    }
  });

  if (response.ok) {
    form.reset();
    successMsg.style.display = "block";
  } else {
    alert("Something went wrong. Please try again.");
  }
});
</script>

</body>
</html>
