<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Date Invite 💌</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ffeccf);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      color: #d63384;
      margin-top: 0;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 20px;
      color: #555;
    }

    label {
      margin-top: 12px;
      display: block;
      font-weight: bold;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }

    .radio-group {
      margin-top: 8px;
      margin-bottom: 10px;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: normal;
      margin-top: 8px;
    }

    .radio-group input[type="radio"] {
      width: auto;
      margin: 0;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #ff4d88;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #e6005c;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>💌 A Small Question For You</h1>
    <p class="subtitle">I made this little page just for you 💖</p>

    <form action="https://formspree.io/f/xkoqdkvn" method="POST">
      <input type="hidden" name="_subject" value="New Date Answer 💌">
      <input type="hidden" name="_captcha" value="false">

      <label for="name">Your name</label>
      <input type="text" id="name" name="name" required>

      <label>Do you want to go on a date with me?</label>
      <div class="radio-group">
        <label><input type="radio" name="answer" value="Yes" required> Yes</label>
        <label><input type="radio" name="answer" value="No"> No</label>
      </div>

      <label for="time">When are you available?</label>
      <input type="text" id="time" name="time" required>

      <label for="place">Which place sounds nicest?</label>
      <select id="place" name="place">
        <option value="Park 🌳">Park 🌳</option>
        <option value="Arcade 🎮">Arcade 🎮</option>
        <option value="Billiard 🎱">Billiard 🎱</option>
        <option value="Tennis 🎾 (Teach me)">Tennis 🎾 (Teach me)</option>
        <option value="other">Other</option>
      </select>

      <input type="text" id="otherPlace" name="other_place" placeholder="Your idea..." class="hidden">

      <label for="food">What would you like?</label>
      <select id="food" name="food">
        <option value="Coffee ☕">Coffee ☕</option>
        <option value="Pizza 🍕">Pizza 🍕</option>
        <option value="Burger 🍔">Burger 🍔</option>
        <option value="Ice cream 🍨">Ice cream 🍨</option>
        <option value="Cake 🍰">Cake 🍰</option>
        <option value="other">Other</option>
      </select>

      <input type="text" id="otherFood" name="other_food" placeholder="Your choice..." class="hidden">

      <label for="message">Any message for me?</label>
      <textarea id="message" name="message"></textarea>

      <button type="submit">Submit 💖</button>
    </form>
  </div>

  <script>
    const place = document.getElementById("place");
    const food = document.getElementById("food");
    const otherPlace = document.getElementById("otherPlace");
    const otherFood = document.getElementById("otherFood");

    place.addEventListener("change", function () {
      otherPlace.classList.toggle("hidden", this.value !== "other");
    });

    food.addEventListener("change", function () {
      otherFood.classList.toggle("hidden", this.value !== "other");
    });
  </script>

</body>
</html>
